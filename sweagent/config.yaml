# SWE-agent v1.x configuration for the gorefactor tool harness.
# Docs: https://swe-agent.com/latest/config/
#
# Design principle: no file-editor tools are registered. The model's only
# effectors are gorefactor CLI commands. This eliminates "falls back to
# normal editing" by removing the escape hatch entirely.
#
# Usage:
#   sweagent run \
#     --config sweagent/config.yaml \
#     --problem_statement "extract the validateOrder logic into a helper" \
#     --repo_path .
#
# To use a local model (e.g. qwen2.5-coder-32b via vLLM):
#   sweagent run --config sweagent/config.yaml \
#     --agent.model.name openai/qwen2.5-coder-32b-instruct \
#     --agent.model.api_base http://localhost:8000/v1 \
#     --problem_statement "..."

agent:
  model:
    name: "anthropic/claude-opus-4-7-20250219"
    # Alternatives:
    #   "openai/gpt-4o"
    #   "openai/qwen2.5-coder-32b-instruct"  (local via vLLM, set api_base)
    per_instance_cost_limit: 4.00
    retry_errors: true

  templates:
    system_template: "sweagent/system_prompt.md"
    instance_template: "sweagent/task_prompt.md"

  tools:
    execution_timeout: 120
    bundles:
      # Sense tools: read-only queries, no side effects.
      - path: "sweagent/tools/sense.yaml"
      # Mutation tools: deterministic AST-correct gorefactor ops.
      - path: "sweagent/tools/mutate.yaml"
      # Control tools: finish / punt / report / run_gate.
      - path: "sweagent/tools/control.yaml"
    # NOTE: str_replace_editor, file_editor, and write_file are
    # intentionally absent. Their absence is what prevents the model
    # from falling back to direct file editing.

  # Mirrors compactMessages(msgs, 12) in run_agentic_driver.go.
  # Keeps history within small context windows (4k-8k tokens).
  history_processors:
    - type: last_n_observations
      n: 12

  # Mirrors maxToolCalls in agent_tools.go.
  max_iterations: 24
