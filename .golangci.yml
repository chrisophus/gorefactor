version: "2"

# Must be <= the Go version the golangci-lint binary was built with,
# or it bails out during type-checking. The pinned linter (v2.12.2,
# see Makefile / CI) ships a pre-built binary compiled with Go 1.26,
# so 1.26 is a valid target. Keep this in sync with go.mod.
run:
  go: "1.26"

linters:
  enable:
    - cyclop
    - funlen
    - dupl
    - errcheck
    - gosec
    - govet
    - staticcheck
    - unused
    - gocritic

  settings:
    cyclop:
      max-complexity: 12
    funlen:
      lines: 75
      statements: 50
    dupl:
      threshold: 100
    gosec:
      excludes:
        - G304  # file path from variable — intentional in a file-editing tool
        - G306  # WriteFile 0644 — correct for source files (not secrets)
        - G301  # MkdirAll 0755 — correct for project directories
        - G401  # MD5 — used for code deduplication fingerprinting, not cryptography
        - G501  # MD5 import — same rationale as G401
        - G204  # subprocess with variable — intentional (goimports calls)

  exclusions:
    rules:
      - linters: [funlen, dupl, cyclop, errcheck, gosec]
        path: _test\.go
      # CLI command files have inherent branching for flag parsing /
      # subcommand dispatch and aren't core logic; exempt them from
      # complexity, length, and unchecked-error noise.
      - linters: [cyclop, funlen, errcheck, gocritic, gosec]
        path: cmd/gorefactor/cmd_.*\.go$
      # The second-tier agent driver (gorefactor-agent) is the same
      # category: a harness of dispatch loops, flag parsing, provider
      # plumbing and stdout reporting, not core algorithmic logic. Same
      # rationale and exemption as the CLI command files above.
      - linters: [cyclop, funlen, errcheck, gocritic, gosec]
        path: cmd/gorefactor-agent/.*\.go$
      # Stylistic gocritic rules — preference, not correctness. Pre-existing
      # patterns; lint warnings here aren't worth churning the code.
      - linters: [gocritic]
        text: "ifElseChain|singleCaseSwitch|assignOp|appendAssign"
      # countComplexity is an intentional recursive AST walker — its
      # complexity is structural, not accidental.
      - linters: [cyclop, errcheck]
        path: analyzer/file_size_analyzer\.go$
      - linters: [funlen]
        path: cmd/gorefactor/main\.go$
      # Empty if-err branches in older tests are intentional ("operation
      # may fail; we only care that it ran"). Documented at the call site.
      - linters: [staticcheck]
        path: orchestrator/(integration|integration_conditional|orchestrator_extract)_test\.go$
        text: "SA9003"
      # parser.ParseDir is "deprecated" since Go 1.25 but still works
      # and is correct for our package-rename use case. Migrating to
      # go/packages is tracked separately.
      - linters: [staticcheck]
        text: "SA1019.*parser.ParseDir"
      # Path-traversal taint warnings for a refactoring CLI that operates
      # on user-specified files are not a real threat model.
      - linters: [gosec]
        text: "G703|G122"
    paths:
      - ^testfiles/
      - ^skill/
      - ^examples/
      - ^move_by_plan\.go$
