tools:
  - name: run_gate
    description: |
      Run go build + go test and report the result. Advisory and
      non-terminal — the loop continues regardless of outcome. Use this
      mid-task to check progress without committing to being done.
      Call finish() (not run_gate) when you believe the task is complete.
    parameters:
      type: object
      properties: {}
    bash: |
      echo "=== build ==="
      if ! go build ./... 2>&1; then
        echo "GATE_RED: build failed"
        exit 0  # non-terminal: loop continues
      fi
      echo "=== test ==="
      if ! go test ./... 2>&1; then
        echo "GATE_RED: tests failed"
        exit 0
      fi
      echo "GATE_GREEN"
      echo "=== lint (advisory) ==="
      ./gorefactor lint . 2>&1 | head -30 || true

  - name: finish
    description: |
      Mark the task complete and run the authoritative gate (go build +
      go test). Call this when all your changes are done. If the gate
      fails, read the error, fix it, and call finish again. After four
      consecutive gate failures, call punt instead.

      On success, outputs <<<TASK_DONE>>> so the harness knows to stop.
    parameters:
      type: object
      properties: {}
    bash: |
      echo "=== build ==="
      if ! go build ./... 2>&1; then
        echo "Gate FAILED (build). Fix the errors above and call finish again."
        exit 1
      fi
      echo "=== test ==="
      if ! go test ./... 2>&1; then
        echo "Gate FAILED (tests). Fix the failures above and call finish again."
        exit 1
      fi
      echo "=== lint (advisory, non-blocking) ==="
      ./gorefactor lint . 2>&1 | head -20 || true
      echo ""
      echo "<<<TASK_DONE>>>"
      echo "Gate green. All changes complete."

  - name: report
    description: |
      Return the answer for a read-only (analysis-only) task and finish
      WITHOUT running the build/test gate. Use for tasks like:
        - "where is X defined?"
        - "who calls Y?"
        - "which files import Z?"
      Do NOT call this after making code changes — use finish() instead.
    parameters:
      type: object
      required: [answer]
      properties:
        answer:
          type: string
          description: "the complete answer to the analysis question"
    bash: |
      echo "<<<ANALYSIS_RESULT>>>"
      cat << '_GOREFACTOR_ANSWER_'
      {answer}
      _GOREFACTOR_ANSWER_
      echo "<<<END_RESULT>>>"

  - name: punt
    description: |
      Give up on the task and hand control back to the caller. Use when:
        - The task requires writing new business logic or algorithms
        - The task requires semantic reasoning that cannot be expressed as
          a sequence of gorefactor tool calls
        - The task mentions performance, race conditions, or algorithm design
        - After four gate failures with no progress

      Always provide a specific reason so the caller can take over.
      The repository is left in a clean state (changes rolled back).
    parameters:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          description: "specific reason why the task cannot be completed with these tools"
    bash: |
      echo "<<<PUNT>>>"
      cat << '_GOREFACTOR_REASON_'
      {reason}
      _GOREFACTOR_REASON_
      echo "<<<END_PUNT>>>"
      # Roll back any uncommitted changes before yielding.
      git checkout -- . 2>/dev/null || true
      git clean -fd 2>/dev/null || true
      exit 3
