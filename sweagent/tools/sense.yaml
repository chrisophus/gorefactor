tools:
  - name: skeleton
    description: |
      Show a Go file with function bodies replaced by stub comments.
      Token-cheap structural overview. Use this first to orient before
      calling read_excerpt — it shows all declaration names and line numbers
      without the full body content.
    parameters:
      type: object
      required: [file]
      properties:
        file:
          type: string
          description: "relative path to the .go file"
    bash: "./gorefactor skeleton {file} 2>&1"

  - name: inspect_file
    description: |
      One-page summary of a Go file: declarations with line counts, lint
      hints, and extraction candidates ranked by complexity. Best first look
      at an unfamiliar file when you want more than just names.
    parameters:
      type: object
      required: [file]
      properties:
        file:
          type: string
          description: "relative path to the .go file"
    bash: "./gorefactor inspect {file} 2>&1"

  - name: read_excerpt
    description: |
      Read a contiguous range of lines from a file (max 80 lines).
      Use this after skeleton to pin exact line numbers before calling
      extract_method. Returns lines with 1-based line number prefixes.
    parameters:
      type: object
      required: [file, start_line, end_line]
      properties:
        file:
          type: string
          description: "relative path to the file"
        start_line:
          type: integer
          description: "first line to read (1-based)"
        end_line:
          type: integer
          description: "last line to read (inclusive; capped at start+80)"
    bash: |
      start={start_line}
      end={end_line}
      # Cap window to 80 lines, matching senseReadExcerpt in the Go agent.
      if [ $((end - start)) -gt 80 ]; then end=$((start + 80)); fi
      awk -v s="$start" -v e="$end" 'NR>=s && NR<=e {printf "%d: %s\n", NR, $0}' {file}

  - name: list_symbols
    description: |
      List all functions and methods declared in a Go file.
      Faster than inspect_file when you only need symbol names, not sizes.
      Returns "func Name" or "method Receiver.Name" per line.
    parameters:
      type: object
      required: [file]
      properties:
        file:
          type: string
          description: "relative path to the .go file"
    bash: |
      # skeleton gives us the structure with line numbers; parse func/method lines.
      ./gorefactor skeleton {file} 2>&1 | grep -E '^(func|//.*func )' | head -60

  - name: find_references
    description: |
      Find all file:line references to a symbol across the repo.
      Call this before renaming, deleting, or moving any symbol — especially
      when the spec names a symbol but not its file.
    parameters:
      type: object
      required: [symbol]
      properties:
        symbol:
          type: string
          description: "identifier to search for (function, type, method, variable name)"
    bash: "./gorefactor find-uses {symbol} 2>&1 | head -80"

  - name: analyze_file_size
    description: |
      Report line count and extraction hints for a file.
      Use to decide whether a file is a split candidate, and to get
      ranked hints about which blocks are most extractable.
    parameters:
      type: object
      required: [file]
      properties:
        file:
          type: string
          description: "relative path to the .go file"
    bash: |
      echo "=== line count ==="
      wc -l < {file}
      echo "=== extraction hints ==="
      ./gorefactor recommend {file} --short 2>/dev/null || echo "(none)"

  - name: lint_path
    description: |
      Run gorefactor lint on a path and return findings.
      Findings include rule name, severity, message, and autofixCmd hints
      for rules that can be auto-fixed. Use after a refactor to check for
      remaining issues.
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "directory or file to lint (default: . for whole repo)"
    bash: |
      p="{path}"
      [ -z "$p" ] && p="."
      ./gorefactor lint "$p" 2>&1

  - name: review_changes
    description: |
      Per-function quality regression report comparing the working tree
      against a git ref. Reports line growth, complexity increases, and
      nesting depth changes. Use after mutations to check for regressions.
    parameters:
      type: object
      properties:
        ref:
          type: string
          description: "git ref to compare against (default: HEAD)"
    bash: |
      ref="{ref}"
      if [ -z "$ref" ]; then
        ./gorefactor review 2>&1
      else
        ./gorefactor review "$ref" 2>&1
      fi
