name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: 'stable'

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run vet
        run: make vet

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Run gorefactor structural lint gate
        run: |
          go build -o gorefactor ./cmd/gorefactor
          ./gorefactor lint . --fail-on error

      # Ratchet: fail on new/worsened warning+ findings vs the committed
      # baseline snapshot (deterministic fingerprint match, line-number
      # independent). The backlog never blocks; growing it does. After a
      # cleanup wave, re-lock with `gorefactor lint . --write-baseline`
      # and commit the shrunken .gorefactor-lint-baseline.json.
      - name: Structural lint ratchet (no new findings vs baseline)
        run: ./gorefactor lint . --baseline --fail-on warning --fail-only

      # One-way enforcement: the committed baseline may only shrink vs the
      # PR base — re-baselining to absorb regressions fails here (set-based
      # per fingerprint, so a swap that keeps the count is still caught).
      # Deliberate growth (e.g. a new lint rule baselining its pre-existing
      # backlog) is opted into visibly: put [baseline-growth] in the head
      # commit message.
      - name: Baseline shrink check (ratchet is one-way)
        if: github.event_name == 'pull_request'
        run: |
          git fetch -q origin "${{ github.base_ref }}" --depth=1
          # On pull_request events the checkout is the synthetic merge
          # commit, whose message is "Merge <sha> into <base>" — reading
          # `git log -1` there can never see the marker. Read the real PR
          # head commit instead.
          if git log -1 --format=%B "${{ github.event.pull_request.head.sha }}" | grep -qF '[baseline-growth]'; then
            echo "skipped: [baseline-growth] marker in head commit"
          else
            ./gorefactor lint . --baseline-ratchet "origin/${{ github.base_ref }}"
          fi

      - name: Run tests
        run: make ci-test

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: 'stable'

      - name: Build
        run: go build -o gorefactor ./cmd/gorefactor

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gorefactor-linux
          path: gorefactor
